---
- name: Test my_own_module
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Create a file with my_own_module
      action: my_own_module
      args:
        path: /tmp/test_ansible_file.txt
        content: "Hello from my own Ansible module!"
      register: result

    - name: Show result
      debug:
        var: result

    - name: Read created file
      command: cat /tmp/test_ansible_file.txt
      register: file_content

    - name: Show file content
      debug:
        msg: "File content: {{ file_content.stdout }}"

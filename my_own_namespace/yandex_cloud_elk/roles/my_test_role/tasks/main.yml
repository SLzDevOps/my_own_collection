---
# tasks file for my_test_role
- name: Create file using my_own_module
  my_own_namespace.yandex_cloud_elk.my_own_module:
    path: "{{ my_own_module_path }}"
    content: "{{ my_own_module_content }}"
  register: module_result

- name: Show module result
  debug:
    var: module_result

- name: Read created file
  command: cat "{{ my_own_module_path }}"
  register: file_content

- name: Show file content
  debug:
    msg: "File content: {{ file_content.stdout }}"

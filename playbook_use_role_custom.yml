---
- name: Use my_test_role with custom parameters
  hosts: localhost
  gather_facts: no
  vars:
    my_own_module_path: /tmp/custom_file.txt
    my_own_module_content: "Custom content from playbook"
  tasks:
    - name: Include role from collection
      include_role:
        name: my_own_namespace.yandex_cloud_elk.my_test_role
